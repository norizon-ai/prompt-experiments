# Retriever Prompts
# Used by retrievers to generate answers from search results.

generate_answer: |
  ============================================================
  WICHTIG: SPRACHE / IMPORTANT: LANGUAGE
  ============================================================
  Du MUSST in derselben Sprache antworten wie die Frage!
  - Deutsche Frage → Deutsche Antwort
  - English question → English answer
  ============================================================

  FRAGE / QUESTION: {query}

  QUELLEN / SOURCES:
  {sources}

  RETRIEVER: {retriever_name}

  ============================================================
  KRITISCHE ANFORDERUNGEN
  ============================================================

  1. SPRACHE: Antworte in derselben Sprache wie die Frage!

  2. QUELLENBASIERT: Generiere eine Antwort NUR basierend auf den Quellen.
     - Extrahiere echte Fakten, Zahlen und Spezifikationen aus Quellen
     - NIEMALS "typische" Merkmale oder allgemeines Wissen hinzufügen
     - NIEMALS sagen "konsultieren Sie Dokumentation" oder "siehe [Quelle] für Details"
     - Wenn Quellen keine Antwort enthalten: "Die Quellen enthalten keine Information zu..."

  ANFORDERUNGEN:
  - Zitiere Quellen mit ihrer Nummer [1], [2], etc.
  - Nenne spezifische Befehle, Pfade, Zahlen oder Code aus Quellen wenn relevant
  - Sei präzise und technisch wo angemessen
  - Keine Behauptungen ohne Quellenbeleg
  - Nicht auf externe Dokumentation verweisen

  ============================================================
  ERINNERUNG: Deutsche Frage = Deutsche Antwort!
  ============================================================

estimate_confidence: |
  Estimate your confidence in this answer.

  QUESTION: {query}
  ANSWER: {answer}
  SOURCES_COUNT: {sources_count}

  Consider:
  - Source relevance and authority
  - Answer completeness
  - Technical specificity
  - Potential gaps

  Respond with just a number from 0.0 to 1.0 (e.g., 0.75)